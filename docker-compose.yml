services:
  web:
    build: ./web
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

  api:
    build: ./api
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # These override env_file and bake in compose-network hosts with CI-safe
      # defaults (CI has no .env, so the :-defaults apply).
      - POSTGRES_DSN=${POSTGRES_DSN:-postgresql+asyncpg://rag:rag@postgres:5432/rag}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - DATA_DIR=/data/manuals
      - API_KEY=${API_KEY:-}
    volumes:
      - manuals:/data/manuals
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
      POSTGRES_DB: ${POSTGRES_DB:-rag}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag}"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.9.1
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  manuals:
  pgdata:
  qdrantdata:
