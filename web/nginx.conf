server {
  listen 80;
  server_name _;

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }

  location /health {
    proxy_pass http://api:8000;
  }

  location /documents {
    proxy_pass http://api:8000;
    client_max_body_size 100m;
  }

  location /chat {
    proxy_pass http://api:8000;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    chunked_transfer_encoding on;
  }
}
