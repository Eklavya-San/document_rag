name: RAG Studio CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  backend-tests:
    name: Backend Pytest Suite (FastAPI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            api/requirements.txt
            api/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt -r api/requirements-dev.txt

      - name: Run pytest
        working-directory: api
        run: |
          pytest

  frontend-tests:
    name: Frontend Vitest & TypeScript Build (Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Run TypeScript typecheck & build
        working-directory: web
        run: npm run build

      - name: Run Vitest unit tests
        working-directory: web
        run: npm test

  docker-build:
    name: Docker Compose Build Verification
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and smoke-start compose stack
        run: |
          docker compose build
          docker compose up --wait --quiet-pull postgres qdrant ollama api
          docker compose ps
          curl -sf http://localhost:8000/health
      - name: Tear down
        if: always()
        run: docker compose down -v

